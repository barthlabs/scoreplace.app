<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  :root { --bg:#0b0f17; --card:#141a24; --border:#28313f; --text:#e8ecf3; --muted:#8b93a3; --accent:#7c81f5; --good:#2dd4a0; }
  body { width: 360px; margin:0; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; }
  .wrap { padding:14px; }
  h1 { font-size:15px; margin:0 0 2px; }
  .sub { font-size:11.5px; color:var(--muted); margin-bottom:12px; }
  button { font-family:inherit; font-size:13.5px; font-weight:700; border:0; border-radius:10px; padding:10px 14px; cursor:pointer; width:100%;
    background:linear-gradient(135deg,var(--accent),#4f46e5); color:#fff; }
  button:disabled { opacity:.55; cursor:default; }
  .bar { height:10px; border-radius:6px; background:#0f1420; border:1px solid var(--border); overflow:hidden; margin-top:12px; }
  .bar > div { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--good)); transition:width .2s; }
  .status { font-size:12px; color:var(--muted); margin-top:8px; min-height:16px; }
  .result { margin-top:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:11px; font-size:12.5px; display:none; }
  .result .row { display:flex; justify-content:space-between; gap:10px; padding:3px 0; }
  .result .row b { color:var(--text); }
  .result .k { color:var(--muted); }
  .mono { font-family:ui-monospace,Menlo,monospace; }
  .off { color:var(--good); font-weight:700; }
  .warn { color:#f0b445; }
  .foot { font-size:10.5px; color:var(--muted); margin-top:10px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🎾 Importar histórico letzplay</h1>
    <div class="sub">Puxa o SEU histórico na sua sessão logada do letzplay. Precisa estar logado em letzplay.me neste navegador (desktop).</div>
    <button id="go">Importar meu histórico</button>
    <div class="bar"><div id="fill"></div></div>
    <div class="status" id="status"></div>
    <div class="result" id="result"></div>
    <div class="foot">Nada de senha. Roda na sua sessão. Os dados vão pro seu perfil no scoreplace.</div>
  </div>
  <script src="lib/letzplay-rating.js"></script>
  <script src="lib/letzplay-import.js"></script>
  <script src="lib/letzplay-extract.js"></script>
  <script src="lib/letzplay-flow.js"></script>
  <script src="popup.js"></script>
</body>
</html>
