name: Deploy to GitHub Pages

# Substitui o builder legacy (Jekyll) do GitHub Pages — que era flaky
# ("Page build failed" duration:0 intermitente). O site é estático puro
# (vanilla JS servido como está, sem etapa de build), então o deploy só
# empacota a raiz do repo e publica via GitHub Actions.
#
# CNAME (scoreplace.app) e .nojekyll vão no artefato — domínio custom e
# o bypass do Jekyll são preservados.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas pro deploy oficial de Pages via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # GATE de PRODUÇÃO: a suíte unitária roda antes de publicar. Se qualquer trava falhar
      # (fixture envenenado uid-poison, apply-wo, sorteio, etc.), o job PARA e nada vai pro
      # ar em scoreplace.app. Rode local com `npm test`. Não depende de memória de ninguém.
      - name: Testes unitários (gate — bloqueia o deploy se falhar)
        run: |
          npm ci --ignore-scripts
          npm test

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (raiz do repo — site estático)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
