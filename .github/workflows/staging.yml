# Deploy do STAGING (Firebase Hosting) — mesmo gatilho do prod (push em main),
# rodando nos servidores do GitHub (clona do git, não toca o mount do Google
# Drive) → rápido e sempre em sincronia com o prod. O prod continua no pages.yml
# (GitHub Pages); este sobe o mesmo conteúdo pro scoreplace-staging.web.app.
#
# Auth: secret FIREBASE_SERVICE_ACCOUNT_STAGING (JSON do service account
# github-hosting-deploy@scoreplace-staging, roles firebasehosting.admin +
# firebase.viewer) → escrito em arquivo e usado via GOOGLE_APPLICATION_CREDENTIALS,
# exatamente como o deploy local. firebase-tools FIXADO (latest teve falha de auth
# "Premature close" no runner).
name: Deploy Staging (Firebase Hosting)

on:
  push:
    # Rotina: push no branch de feature → deploya SÓ o staging (pages.yml é só em
    # main). Promoção pra prod (push em main) refresca o staging junto.
    branches: [main, 'feature/**']
  workflow_dispatch: {}

concurrency:
  group: staging-hosting
  cancel-in-progress: true

jobs:
  deploy_staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # O predeploy do hosting (firebase.json) roda `npm run prerender`, que usa
      # @playwright/test (devDependency). Sem instalar as deps do repo + o browser
      # Chromium, o deploy falha com "Cannot find module '@playwright/test'".
      # --ignore-scripts evita lifecycle scripts inesperados; só precisamos do
      # node_modules pro prerender. (index.html JÁ vem pré-renderizado pelo git
      # pre-push hook; aqui o prerender só reconfirma — é idempotente.)
      - name: Install repo deps (predeploy prerender)
        run: npm ci --ignore-scripts
      - name: Install Playwright Chromium (predeploy prerender)
        run: npx playwright install --with-deps chromium
      - name: Install firebase-tools
        run: npm install -g firebase-tools@15.12.0
      - name: Write service account key
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
        run: printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
      - name: Deploy to staging hosting (live)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: firebase deploy --only hosting --project scoreplace-staging --non-interactive
